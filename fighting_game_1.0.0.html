<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ECHO - Boss Battle</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        
        body {
            background-color: #000;
            color: #fff;
            font-family: 'VT323', 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        #game-container {
            position: relative;
            width: 640px;
            height: 480px;
            border: 4px solid #fff;
            background-color: #000;
            image-rendering: pixelated;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        #ui-layer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 140px;
            border-top: 4px solid #fff;
            background-color: #000;
            display: flex;
            flex-direction: column;
            padding: 15px;
            box-sizing: border-box;
            cursor: pointer;
        }

        #enemy-info {
            position: absolute;
            top: -65px;
            left: 20px;
            font-size: 28px;
            color: #fff;
            text-shadow: 2px 2px #000;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        #enemy-hp-container {
            width: 150px;
            height: 16px;
            background-color: #500;
            border: 2px solid #fff;
            position: relative;
        }

        #enemy-hp-fill {
            width: 100%;
            height: 100%;
            background-color: #0f0;
            transition: width 0.3s ease-out;
        }

        #dialogue-box {
            font-size: 26px;
            line-height: 1.3;
            margin-bottom: 10px;
            min-height: 65px;
            white-space: pre-wrap;
        }

        #action-bar {
            display: flex;
            gap: 20px;
            margin-top: auto;
        }

        .action-btn {
            border: 3px solid #ff8c00;
            color: #ff8c00;
            padding: 8px 24px;
            font-size: 32px;
            font-family: inherit;
            background: #000;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.1s;
        }

        .action-btn:active {
            transform: scale(0.95);
        }

        .action-btn.active {
            background-color: #ff8c00;
            color: #000;
            box-shadow: 0 0 10px #ff8c00;
        }

        .action-btn::before {
            content: '❤';
            font-size: 22px;
            opacity: 0;
        }

        .action-btn.active::before {
            opacity: 1;
        }

        #hp-bar-container {
            position: absolute;
            bottom: 15px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 28px;
        }

        #hp-bar-bg {
            width: 120px;
            height: 24px;
            background-color: #f00;
            border: 3px solid #fff;
        }

        #hp-bar-fill {
            width: 100%;
            height: 100%;
            background-color: #ff0;
            transition: width 0.2s ease-out;
        }

        #attack-overlay {
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 420px;
            height: 90px;
            background: #000;
            border: 4px solid #fff;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        #attack-bar {
            width: 380px;
            height: 24px;
            background: #222;
            position: relative;
            border: 3px solid #fff;
        }

        #attack-center {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 50px;
            background: rgba(255, 255, 255, 0.2);
            border-left: 2px solid rgba(255, 255, 255, 0.5);
            border-right: 2px solid rgba(255, 255, 255, 0.5);
            transform: translateX(-50%);
        }

        #attack-cursor {
            position: absolute;
            top: -6px;
            bottom: -6px;
            width: 6px;
            background: #0f0;
            left: 0;
            box-shadow: 0 0 8px #0f0;
            border: 1px solid #fff;
        }

        #damage-text {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 64px;
            font-weight: bold;
            color: #fff;
            display: none;
            text-shadow: 4px 4px 0 #f00, -2px -2px 0 #000;
            z-index: 20;
            pointer-events: none;
        }

        .hidden { display: none !important; }
        
        @media (max-width: 660px) {
            #game-container {
                width: 100vw;
                height: 100vh;
                border: none;
            }
            canvas {
                width: 100%;
                height: auto;
            }
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="640" height="340"></canvas>
    
    <div id="enemy-info">
        <div>ECHO LV.1</div>
        <div id="enemy-hp-container"><div id="enemy-hp-fill"></div></div>
    </div>
    <div id="damage-text">0</div>
    
    <div id="attack-overlay">
        <div style="margin-bottom: 8px; font-size: 22px; color: #0f0;">PRESS [Z], [SPACE], OR CLICK TO STRIKE</div>
        <div id="attack-bar">
            <div id="attack-center"></div>
            <div id="attack-cursor"></div>
        </div>
    </div>

    <div id="ui-layer">
        <div id="dialogue-box">* The void stares back, measuring your resonance.
* Click here or press [SPACE] to begin.</div>
        <div id="action-bar">
            <div class="action-btn active" id="btn-attack">ATTACK</div>
        </div>
        <div id="hp-bar-container">
            <span>HP</span>
            <div id="hp-bar-bg"><div id="hp-bar-fill"></div></div>
            <span id="hp-text">20 / 20</span>
        </div>
    </div>
</div>

<script>
/**
 * ECHO - Boss Battle
 * Mechanics: Guaranteed dodgeable patterns, fixed inter-round healing, enemy HP bar.
 */

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const dialogueBox = document.getElementById('dialogue-box');
const hpFill = document.getElementById('hp-bar-fill');
const hpText = document.getElementById('hp-text');
const enemyHpFill = document.getElementById('enemy-hp-fill');
const attackOverlay = document.getElementById('attack-overlay');
const attackCursor = document.getElementById('attack-cursor');
const damageText = document.getElementById('damage-text');
const btnAttack = document.getElementById('btn-attack');
const uiLayer = document.getElementById('ui-layer');

// Game Constants
const BOX_X = 220;
const BOX_Y = 140;
const BOX_W = 200;
const BOX_H = 160;
const PLAYER_RADIUS_VISUAL = 8;
const PLAYER_RADIUS_HITBOX = 4; // Strict Undertale-like hitbox
const PLAYER_SPEED = 3.5;

// Game State
let state = 'DIALOGUE'; 
let frame = 0;
let turn = 1;
let difficulty = 1.0;
let turnTimer = 0;

// Dialogue Pool
const dialogues = [
    "* Your heartbeat is a flickering candle in the dark.",
    "* Do you remember the previous iterations?",
    "* Static fills the silence between your thoughts.",
    "* A curious persistence, for something so fragile.",
    "* The cycle repeats, yet you remain unchanged.",
    "* Your determination is a loud, dissonant chord.",
    "* The geometry of your soul is... predictable.",
    "* Every bounce is a calculated variable.",
    "* Can you find the rhythm in the chaos?"
];

// Entities
const player = {
    x: BOX_X + BOX_W / 2,
    y: BOX_Y + BOX_H / 2,
    hp: 20,
    maxHp: 20,
    invincible: 0,
    color: '#f00'
};

const enemy = {
    x: 320,
    y: 60,
    hp: 100,
    maxHp: 100,
    shake: 0,
    pulse: 0
};

let projectiles = [];
let particles = [];

// Input Handling
const keys = {};
let mouseX = 0, mouseY = 0;
let isMouseDown = false;

window.addEventListener('keydown', (e) => {
    keys[e.code] = true;
    if (e.code === 'KeyZ' || e.code === 'Space') {
        e.preventDefault();
        handleAction();
    }
});
window.addEventListener('keyup', (e) => keys[e.code] = false);

canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
    mouseY = (e.clientY - rect.top) * (canvas.height / rect.height);
});
canvas.addEventListener('mousedown', () => { isMouseDown = true; handleAction(); });
canvas.addEventListener('mouseup', () => isMouseDown = false);
canvas.addEventListener('touchstart', (e) => {
    isMouseDown = true;
    const rect = canvas.getBoundingClientRect();
    mouseX = (e.touches[0].clientX - rect.left) * (canvas.width / rect.width);
    mouseY = (e.touches[0].clientY - rect.top) * (canvas.height / rect.height);
    handleAction();
    e.preventDefault();
}, {passive: false});
canvas.addEventListener('touchmove', (e) => {
    const rect = canvas.getBoundingClientRect();
    mouseX = (e.touches[0].clientX - rect.left) * (canvas.width / rect.width);
    mouseY = (e.touches[0].clientY - rect.top) * (canvas.height / rect.height);
    e.preventDefault();
}, {passive: false});
canvas.addEventListener('touchend', () => isMouseDown = false);

btnAttack.addEventListener('click', (e) => {
    e.stopPropagation();
    handleAction();
});
uiLayer.addEventListener('click', () => {
    if (state === 'DIALOGUE') handleAction();
});

function handleAction() {
    if (state === 'DIALOGUE') {
        nextDialogue();
    } else if (state === 'PLAYER_TURN') {
        startAttack();
    } else if (state === 'ATTACK_ANIM') {
        resolveAttack();
    } else if (state === 'GAME_OVER' || state === 'VICTORY') {
        location.reload();
    }
}

function updateUI() {
    if (state === 'DIALOGUE') {
        btnAttack.textContent = 'CONTINUE';
        btnAttack.className = 'action-btn';
    } else if (state === 'PLAYER_TURN') {
        btnAttack.textContent = 'ATTACK';
        btnAttack.className = 'action-btn active';
    } else if (state === 'ATTACK_ANIM') {
        btnAttack.textContent = 'STRIKE!';
        btnAttack.className = 'action-btn active';
        btnAttack.style.borderColor = '#0f0';
        btnAttack.style.color = '#0f0';
    } else {
        btnAttack.textContent = '...';
        btnAttack.className = 'action-btn';
        btnAttack.style.borderColor = '#555';
        btnAttack.style.color = '#555';
    }
}

function nextDialogue() {
    if (turn === 1) {
        state = 'PLAYER_TURN';
        dialogueBox.textContent = "* ECHO blocks the way.\n* Press [SPACE], [Z], or click ATTACK to fight.";
        updateUI();
    } else {
        startEnemyTurn();
    }
}

// Attack Mini-game
let attackCursorPos = 0;
let attackDirection = 1;
let attackSpeed = 5;

function startAttack() {
    state = 'ATTACK_ANIM';
    attackOverlay.style.display = 'flex';
    attackCursorPos = 0;
    attackDirection = 1;
    updateUI();
}

function resolveAttack() {
    state = 'RESOLVING';
    
    const center = 190; 
    const distance = Math.abs(attackCursorPos - center);
    let accuracy = Math.max(0, 1 - (distance / 190));
    
    // Small randomness (+/- 5%)
    accuracy += (Math.random() * 0.1 - 0.05);
    accuracy = Math.max(0, Math.min(1, accuracy));
    
    let baseDamage = 15;
    let damage = Math.floor(baseDamage * accuracy + (Math.random() * 4 - 2));
    damage = Math.max(1, damage); 
    
    enemy.hp -= damage;
    enemy.shake = 12;
    updateEnemyHPUI();
    
    damageText.textContent = damage;
    damageText.style.display = 'block';
    damageText.style.color = accuracy > 0.85 ? '#ff0' : '#fff';
    
    for(let i = 0; i < 10; i++) {
        particles.push({
            x: enemy.x,
            y: enemy.y,
            vx: (Math.random() - 0.5) * 6,
            vy: (Math.random() - 0.5) * 6,
            life: 30,
            color: accuracy > 0.85 ? '#ff0' : '#fff'
        });
    }
    
    setTimeout(() => {
        damageText.style.display = 'none';
        attackOverlay.style.display = 'none';
        btnAttack.style.borderColor = ''; 
        btnAttack.style.color = '';
        
        if (enemy.hp <= 0) {
            state = 'VICTORY';
            dialogueBox.textContent = "* The resonance fades. The void is quiet.\n* (Click or press SPACE to restart)";
            updateUI();
        } else {
            startEnemyTurn();
        }
    }, 800);
}

function startEnemyTurn() {
    state = 'ENEMY_TURN';
    turnTimer = 300; // 5 seconds at 60fps
    projectiles = [];
    
    // Oscillating difficulty
    difficulty = 1.0 + (turn * 0.15) + Math.sin(turn * 0.8) * 0.4;
    difficulty = Math.max(0.8, difficulty);
    
    generatePattern();
    dialogueBox.textContent = dialogues[Math.floor(Math.random() * dialogues.length)];
    updateUI();
}

function startPlayerTurn() {
    state = 'PLAYER_TURN';
    // FIXED REGENERATION: Heal exactly 3 HP between rounds
    let healAmount = 3;
    player.hp = Math.min(player.maxHp, player.hp + healAmount);
    updateHPUI();
    
    dialogueBox.textContent = "* ECHO's form wavers.\n* Press [SPACE], [Z], or click ATTACK.";
    updateUI();
}

function generatePattern() {
    const patternType = turn % 6; 
    
    if (patternType === 0) {
        // Rain: Guaranteed gaps between falling bones
        const columns = 5;
        const colWidth = (BOX_W - 40) / columns;
        for (let i = 0; i < columns; i++) {
            // 60% chance to spawn in a column, guaranteeing at least 1-2 safe vertical paths
            if (Math.random() > 0.4) {
                projectiles.push({
                    x: BOX_X + 20 + (i * colWidth) + (colWidth / 2) - 4,
                    y: BOX_Y - 40 - (Math.random() * 80),
                    w: 8, h: 30,
                    vx: 0, vy: 2.5 + (difficulty * 0.4),
                    type: 'bone', color: '#fff', delay: i * 8
                });
            }
        }
    } else if (patternType === 1) {
        // Cross: Horizontal bones with guaranteed vertical gaps
        const rows = 4;
        const rowHeight = (BOX_H - 40) / rows;
        for (let i = 0; i < rows; i++) {
            if (Math.random() > 0.4) {
                // Left side
                projectiles.push({
                    x: BOX_X - 30,
                    y: BOX_Y + 20 + (i * rowHeight) + (rowHeight / 2) - 4,
                    w: 30, h: 8,
                    vx: 2.5 + (difficulty * 0.4), vy: 0,
                    type: 'bone', color: '#fff', delay: i * 10
                });
                // Right side
                projectiles.push({
                    x: BOX_X + BOX_W + 30,
                    y: BOX_Y + 20 + (i * rowHeight) + (rowHeight / 2) - 4,
                    w: 30, h: 8,
                    vx: -(2.5 + (difficulty * 0.4)), vy: 0,
                    type: 'bone', color: '#fff', delay: i * 10
                });
            }
        }
    } else if (patternType === 2) {
        // Sine Wave: Slow, predictable orbital movement
        const count = 4;
        for (let i = 0; i < count; i++) {
            projectiles.push({
                x: BOX_X - 30,
                y: BOX_Y + BOX_H / 2,
                w: 14, h: 14,
                vx: 2.0 + (difficulty * 0.3),
                vy: 0,
                type: 'orb',
                color: '#0ff',
                delay: i * 30,
                phase: Math.random() * Math.PI * 2,
                amp: 25 // Bounded amplitude to keep it dodgeable
            });
        }
    } else if (patternType === 3) {
        // Closing Walls: GUARANTEED 70px safe gap in the middle
        const gap = 70; 
        const wallH = (BOX_H - gap) / 2; // ~45px each
        const speed = 1.2 + (difficulty * 0.2); // Slow, deliberate speed
        
        projectiles.push({
            x: BOX_X, y: BOX_Y - 50, w: BOX_W, h: wallH,
            vx: 0, vy: speed,
            type: 'wall', color: '#f80', delay: 0
        });
        projectiles.push({
            x: BOX_X, y: BOX_Y + BOX_H + 50 - wallH, w: BOX_W, h: wallH,
            vx: 0, vy: -speed,
            type: 'wall', color: '#f80', delay: 0
        });
    } else if (patternType === 4) {
        // Ricochet: Max 2 slow bouncing orbs to prevent clutter
        const count = 2;
        for (let i = 0; i < count; i++) {
            projectiles.push({
                x: BOX_X + 30 + (i * 60),
                y: BOX_Y + 30 + (i * 40),
                w: 14, h: 14,
                vx: (i % 2 === 0 ? 1 : -1) * (2.0 + (difficulty * 0.2)),
                vy: (i % 2 === 0 ? 1 : -1) * (2.0 + (difficulty * 0.2)),
                type: 'bounce',
                color: '#f0f',
                delay: i * 20,
                life: 350
            });
        }
    } else if (patternType === 5) {
        // Rotating Spokes: 2 spokes (180° apart) with a charge-up warning
        const spokeCount = 2; 
        for (let i = 0; i < spokeCount; i++) {
            projectiles.push({
                type: 'spoke',
                angle: (Math.PI * 2 / spokeCount) * i,
                length: Math.max(BOX_W, BOX_H) * 0.8,
                rotationSpeed: 0.012 + (difficulty * 0.004), // Very slow rotation
                color: '#0f0',
                delay: 0,
                chargeTime: 45, // 0.75 seconds to find a safe spot
                life: 350
            });
        }
    }
}

// Helper: Distance from point to line segment
function distToSegment(px, py, x1, y1, x2, y2) {
    const l2 = (x1 - x2) ** 2 + (y1 - y2) ** 2;
    if (l2 === 0) return Math.hypot(px - x1, py - y1);
    let t = ((px - x1) * (x2 - x1) + (py - y1) * (y2 - y1)) / l2;
    t = Math.max(0, Math.min(1, t));
    return Math.hypot(px - (x1 + t * (x2 - x1)), py - (y1 + t * (y2 - y1)));
}

function update() {
    frame++;
    
    if (state === 'ATTACK_ANIM') {
        attackCursorPos += attackSpeed * attackDirection;
        if (attackCursorPos >= 380 || attackCursorPos <= 0) {
            attackDirection *= -1;
        }
        attackCursor.style.left = attackCursorPos + 'px';
    }
    
    if (state === 'ENEMY_TURN') {
        turnTimer--;
        
        // Player Movement
        let dx = 0, dy = 0;
        if (keys['ArrowUp'] || keys['KeyW']) dy = -PLAYER_SPEED;
        if (keys['ArrowDown'] || keys['KeyS']) dy = PLAYER_SPEED;
        if (keys['ArrowLeft'] || keys['KeyA']) dx = -PLAYER_SPEED;
        if (keys['ArrowRight'] || keys['KeyD']) dx = PLAYER_SPEED;
        
        if (isMouseDown) {
            let targetX = mouseX;
            let targetY = mouseY;
            let diffX = targetX - player.x;
            let diffY = targetY - player.y;
            let dist = Math.sqrt(diffX * diffX + diffY * diffY);
            if (dist > 2) {
                dx = (diffX / dist) * PLAYER_SPEED;
                dy = (diffY / dist) * PLAYER_SPEED;
            }
        }
        
        if (dx !== 0 && dy !== 0 && !isMouseDown) {
            dx *= 0.707;
            dy *= 0.707;
        }
        
        player.x = Math.max(BOX_X + PLAYER_RADIUS_HITBOX, Math.min(BOX_X + BOX_W - PLAYER_RADIUS_HITBOX, player.x + dx));
        player.y = Math.max(BOX_Y + PLAYER_RADIUS_HITBOX, Math.min(BOX_Y + BOX_H - PLAYER_RADIUS_HITBOX, player.y + dy));
        
        // Update Projectiles
        for (let i = projectiles.length - 1; i >= 0; i--) {
            let p = projectiles[i];
            
            if (p.delay > 0) {
                p.delay--;
                continue;
            }
            
            if (p.life !== undefined) {
                p.life--;
                if (p.life <= 0) {
                    projectiles.splice(i, 1);
                    continue;
                }
            }
            
            // Bouncing logic
            if (p.type === 'bounce') {
                p.x += p.vx;
                p.y += p.vy;
                
                if (p.x <= BOX_X || p.x + p.w >= BOX_X + BOX_W) {
                    p.vx *= -1;
                    p.x = Math.max(BOX_X, Math.min(BOX_X + BOX_W - p.w, p.x));
                }
                if (p.y <= BOX_Y || p.y + p.h >= BOX_Y + BOX_H) {
                    p.vy *= -1;
                    p.y = Math.max(BOX_Y, Math.min(BOX_Y + BOX_H - p.h, p.y));
                }
            } 
            // Rotating spoke logic
            else if (p.type === 'spoke') {
                if (p.chargeTime > 0) {
                    p.chargeTime--;
                } else {
                    p.angle += p.rotationSpeed;
                }
            } 
            // Standard movement
            else {
                p.x += p.vx;
                p.y += p.vy;
                if (p.type === 'orb') {
                    p.y += Math.sin(frame * 0.08 + p.phase) * 2.0;
                }
            
                // Remove standard projectiles if out of bounds
                if (p.x < BOX_X - 60 || p.x > BOX_X + BOX_W + 60 || 
                    p.y < BOX_Y - 60 || p.y > BOX_Y + BOX_H + 60) {
                    projectiles.splice(i, 1);
                    continue;
                }
            }
            
            // Collision Detection
            if (player.invincible <= 0) {
                let hit = false;
                
                if (p.type === 'spoke') {
                    // Only collide if charge time is over
                    if (p.chargeTime <= 0) {
                        const cx = BOX_X + BOX_W / 2;
                        const cy = BOX_Y + BOX_H / 2;
                        const ex = cx + Math.cos(p.angle) * p.length;
                        const ey = cy + Math.sin(p.angle) * p.length;
                        
                        const dist = distToSegment(player.x, player.y, cx, cy, ex, ey);
                        if (dist < PLAYER_RADIUS_HITBOX + 3) { // +3 for visual line thickness
                            hit = true;
                        }
                    }
                } else {
                    // Standard AABB vs Circle
                    let closestX = Math.max(p.x, Math.min(player.x, p.x + p.w));
                    let closestY = Math.max(p.y, Math.min(player.y, p.y + p.h));
                    let distanceX = player.x - closestX;
                    let distanceY = player.y - closestY;
                    let distanceSquared = (distanceX * distanceX) + (distanceY * distanceY);
                    
                    if (distanceSquared < (PLAYER_RADIUS_HITBOX * PLAYER_RADIUS_HITBOX)) {
                        hit = true;
                    }
                }
                
                if (hit) {
                    player.hp -= 4;
                    player.invincible = 60; // 1 second iframes
                    updateHPUI();
                    
                    canvas.style.transform = `translate(${Math.random()*6-3}px, ${Math.random()*6-3}px)`;
                    setTimeout(() => canvas.style.transform = 'none', 100);
                    
                    if (player.hp <= 0) {
                        player.hp = 0;
                        state = 'GAME_OVER';
                        dialogueBox.textContent = "* Your resonance fades to zero.\n* (Click or press SPACE to restart)";
                        updateHPUI();
                        updateUI();
                    }
                }
            }
        }
        
        if (player.invincible > 0) player.invincible--;
        
        // End turn condition with failsafe
        if (turnTimer <= 0) {
            if (projectiles.length === 0 || turnTimer <= -60) {
                projectiles = []; 
                turn++;
                startPlayerTurn();
            }
        }
    }
    
    // Enemy shake decay
    if (enemy.shake > 0) enemy.shake *= 0.85;
    if (enemy.shake < 0.5) enemy.shake = 0;
    enemy.pulse = Math.sin(frame * 0.05) * 5;
    
    // Update particles
    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life--;
        if (p.life <= 0) particles.splice(i, 1);
    }
}

function draw() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Draw Enemy (ECHO)
    ctx.save();
    let shakeX = (Math.random() - 0.5) * enemy.shake;
    let shakeY = (Math.random() - 0.5) * enemy.shake;
    ctx.translate(enemy.x + shakeX, enemy.y + shakeY + enemy.pulse);
    
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.moveTo(0, -30);
    ctx.lineTo(25, 0);
    ctx.lineTo(0, 30);
    ctx.lineTo(-25, 0);
    ctx.closePath();
    ctx.fill();
    
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.moveTo(0, -15);
    ctx.lineTo(12, 0);
    ctx.lineTo(0, 15);
    ctx.lineTo(-12, 0);
    ctx.closePath();
    ctx.fill();
    
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.ellipse(0, 0, 40 + enemy.pulse, 15, frame * 0.02, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
    
    // Draw Battle Box
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 4;
    ctx.strokeRect(BOX_X, BOX_Y, BOX_W, BOX_H);
    
    // Draw Projectiles
    for (let p of projectiles) {
        if (p.delay > 0) {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
        } else {
            ctx.fillStyle = p.color;
        }
        
        if (p.type === 'bone') {
            ctx.fillRect(p.x, p.y, p.w, p.h);
            ctx.fillRect(p.x - 2, p.y, p.w + 4, 4);
            ctx.fillRect(p.x - 2, p.y + p.h - 4, p.w + 4, 4);
        } else if (p.type === 'orb' || p.type === 'bounce') {
            ctx.beginPath();
            ctx.arc(p.x + p.w/2, p.y + p.h/2, p.w/2, 0, Math.PI * 2);
            ctx.fill();
        } else if (p.type === 'wall') {
            ctx.fillRect(p.x, p.y, p.w, p.h);
        } else if (p.type === 'spoke') {
            const cx = BOX_X + BOX_W / 2;
            const cy = BOX_Y + BOX_H / 2;
            const ex = cx + Math.cos(p.angle) * p.length;
            const ey = cy + Math.sin(p.angle) * p.length;
            
            // Charge up visual: semi-transparent before becoming solid
            ctx.globalAlpha = p.chargeTime > 0 ? 0.3 : 1.0;
            
            ctx.strokeStyle = p.color;
            ctx.lineWidth = 6;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(ex, ey);
            ctx.stroke();
            
            // Inner bright core
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(ex, ey);
            ctx.stroke();
            
            ctx.globalAlpha = 1.0;
        }
    }
    
    // Draw Player
    if (state !== 'GAME_OVER') {
        ctx.save();
        ctx.translate(player.x, player.y);
        
        if (player.invincible > 0 && Math.floor(frame / 4) % 2 === 0) {
            ctx.globalAlpha = 0.5;
        }
        
        // Visual heart
        ctx.fillStyle = player.color;
        ctx.beginPath();
        ctx.arc(0, 0, PLAYER_RADIUS_VISUAL, 0, Math.PI * 2);
        ctx.fill();
        
        // Precise hitbox indicator
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(0, 0, 2, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.restore();
    }
    
    // Draw Particles
    for (let p of particles) {
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life / 30;
        ctx.fillRect(p.x, p.y, 4, 4);
    }
    ctx.globalAlpha = 1.0;
    
    // Game Over / Victory Text
    if (state === 'GAME_OVER' || state === 'VICTORY') {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = state === 'GAME_OVER' ? '#f00' : '#ff0';
        ctx.font = '56px VT323';
        ctx.textAlign = 'center';
        ctx.fillText(state === 'GAME_OVER' ? 'GAME OVER' : 'VICTORY', canvas.width/2, canvas.height/2 - 10);
        ctx.font = '28px VT323';
        ctx.fillStyle = '#fff';
        ctx.fillText('Click or press [SPACE] to restart', canvas.width/2, canvas.height/2 + 40);
    }
}

function updateHPUI() {
    const pct = Math.max(0, (player.hp / player.maxHp) * 100);
    hpFill.style.width = pct + '%';
    hpText.textContent = `${Math.ceil(player.hp)} / ${player.maxHp}`;
}

function updateEnemyHPUI() {
    const pct = Math.max(0, (enemy.hp / enemy.maxHp) * 100);
    enemyHpFill.style.width = pct + '%';
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

// Start
updateHPUI();
updateEnemyHPUI();
updateUI();
loop();

</script>
</body>
